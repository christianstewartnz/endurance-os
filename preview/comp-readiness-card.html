<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>comp-readiness-card</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Readiness card</div>
  <div style="display:flex;gap:14px;">
    
      <div style="flex:1;background:var(--bg-2);border:1px solid var(--border-default);border-radius:10px;padding:16px;">
        <div class="eyebrow" style="font-size:10px;">HRV</div>
        <div class="mono" style="font-size:24px;font-weight:500;letter-spacing:-0.01em;margin-top:8px;color:var(--fg-1);">64<span style="font-size:12px;color:var(--fg-3);"> ms</span></div>
        <div class="mono" style="font-size:11px;margin-top:4px;color:#E89B3C;">-8%</div>
      </div>
      <div style="flex:1;background:var(--bg-2);border:1px solid var(--border-default);border-radius:10px;padding:16px;">
        <div class="eyebrow" style="font-size:10px;">RHR</div>
        <div class="mono" style="font-size:24px;font-weight:500;letter-spacing:-0.01em;margin-top:8px;color:var(--fg-1);">48<span style="font-size:12px;color:var(--fg-3);"> bpm</span></div>
        <div class="mono" style="font-size:11px;margin-top:4px;color:#E89B3C;">+2</div>
      </div>
      <div style="flex:1;background:var(--bg-2);border:1px solid var(--border-default);border-radius:10px;padding:16px;">
        <div class="eyebrow" style="font-size:10px;">Sleep</div>
        <div class="mono" style="font-size:24px;font-weight:500;letter-spacing:-0.01em;margin-top:8px;color:var(--fg-1);">6:12<span style="font-size:12px;color:var(--fg-3);"> h</span></div>
        <div class="mono" style="font-size:11px;margin-top:4px;color:#E5484D;">-1:18</div>
      </div>
      <div style="flex:1;background:var(--bg-2);border:1px solid var(--border-default);border-radius:10px;padding:16px;">
        <div class="eyebrow" style="font-size:10px;">Load</div>
        <div class="mono" style="font-size:24px;font-weight:500;letter-spacing:-0.01em;margin-top:8px;color:var(--fg-1);">TSB -12<span style="font-size:12px;color:var(--fg-3);"> </span></div>
        <div class="mono" style="font-size:11px;margin-top:4px;color:var(--fg-3);">7d</div>
      </div>
  </div></div>
</body>
</html>
