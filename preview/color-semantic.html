<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>color-semantic</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Semantic</div>
  <div class="row" style="gap:14px;">
    
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#3FB37F;"></div>
        <div class="swatch-name">--success</div>
        <div class="swatch-value">#3FB37F · Synced, complete</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#E89B3C;"></div>
        <div class="swatch-name">--warning</div>
        <div class="swatch-value">#E89B3C · Stale, attention</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#E5484D;"></div>
        <div class="swatch-name">--danger</div>
        <div class="swatch-value">#E5484D · Failed, missed</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#3B9EFF;"></div>
        <div class="swatch-name">--info</div>
        <div class="swatch-value">#3B9EFF · Neutral notice</div>
      </div>
  </div></div>
</body>
</html>
