<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>comp-ai-bubble</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">AI Coach message</div>
  <div style="display:flex;gap:12px;align-items:flex-start;max-width:560px;">
    <div style="width:24px;height:24px;border-radius:6px;background:rgba(139,124,246,0.14);border:1px solid rgba(139,124,246,0.32);display:flex;align-items:center;justify-content:center;color:#8B7CF6;font-size:10px;font-family:var(--font-mono);font-weight:600;flex-shrink:0;">AI</div>
    <div style="background:rgba(139,124,246,0.08);border:1px solid rgba(139,124,246,0.18);border-radius:10px;padding:14px 16px;">
      <div style="font-size:14px;color:var(--fg-1);line-height:1.55;">
        HRV is 8% below your 14-day baseline and sleep was 6h 12m. I'd swap today's threshold block for <span style="background:var(--accent-soft);padding:1px 5px;border-radius:3px;color:var(--accent);font-family:var(--font-mono);font-size:13px;">90 min Z2</span>. Threshold can move to Thu — the rest of the week absorbs it.
      </div>
      <div class="row" style="gap:8px;margin-top:12px;">
        <button class="btn btn-secondary" style="height:26px;padding:0 10px;font-size:12px;">Apply suggestion</button>
        <button class="btn btn-ghost" style="height:26px;padding:0 10px;font-size:12px;">Explain</button>
      </div>
    </div>
  </div></div>
</body>
</html>
