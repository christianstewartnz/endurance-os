<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>comp-list-row</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">List row · session review</div>
  <div style="background:var(--bg-2);border:1px solid var(--border-default);border-radius:10px;overflow:hidden;">
    
      <div style="display:grid;grid-template-columns:120px 1fr 80px 80px 50px;gap:14px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-subtle);">
        <div class="mono" style="font-size:12px;color:var(--fg-3);">Mon · Jun 2</div>
        <div style="font-size:13px;color:var(--fg-1);">Z2 base ride</div>
        <div class="mono" style="font-size:12px;color:var(--fg-2);">1h 30m</div>
        <div class="mono" style="font-size:12px;color:var(--fg-2);">TSS 62</div>
        <div><span class="pill" style="background:rgba(63,179,127,0.16);color:#3FB37F;">Z2</span></div>
      </div>
      <div style="display:grid;grid-template-columns:120px 1fr 80px 80px 50px;gap:14px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-subtle);">
        <div class="mono" style="font-size:12px;color:var(--fg-3);">Tue · Jun 3</div>
        <div style="font-size:13px;color:var(--fg-1);">Threshold 4×8</div>
        <div class="mono" style="font-size:12px;color:var(--fg-2);">1h 42m</div>
        <div class="mono" style="font-size:12px;color:var(--fg-2);">TSS 98</div>
        <div><span class="pill" style="background:rgba(232,155,60,0.16);color:#E89B3C;">Z4</span></div>
      </div>
      <div style="display:grid;grid-template-columns:120px 1fr 80px 80px 50px;gap:14px;align-items:center;padding:12px 16px;">
        <div class="mono" style="font-size:12px;color:var(--fg-3);">Wed · Jun 4</div>
        <div style="font-size:13px;color:var(--fg-1);">Recovery spin</div>
        <div class="mono" style="font-size:12px;color:var(--fg-2);">45m</div>
        <div class="mono" style="font-size:12px;color:var(--fg-2);">TSS 24</div>
        <div><span class="pill" style="background:rgba(92,100,112,0.18);color:#A2A8B4;">Z1</span></div>
      </div>
  </div></div>
</body>
</html>
