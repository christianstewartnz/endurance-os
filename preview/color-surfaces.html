<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>color-surfaces</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Surfaces</div>
  <div class="row" style="gap:14px;">
    
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#08090A;"></div>
        <div class="swatch-name">--bg-0</div>
        <div class="swatch-value">#08090A · Canvas</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#0E0F11;"></div>
        <div class="swatch-name">--bg-1</div>
        <div class="swatch-value">#0E0F11 · Sidebar</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#16181C;"></div>
        <div class="swatch-name">--bg-2</div>
        <div class="swatch-value">#16181C · Card</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#1E2025;"></div>
        <div class="swatch-name">--bg-3</div>
        <div class="swatch-value">#1E2025 · Hover</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#262931;"></div>
        <div class="swatch-name">--bg-4</div>
        <div class="swatch-value">#262931 · Pressed</div>
      </div>
  </div></div>
</body>
</html>
