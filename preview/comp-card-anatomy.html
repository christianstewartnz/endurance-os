<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>comp-card-anatomy</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Card anatomy</div>
  <div style="background:var(--bg-2);border:1px solid var(--border-default);border-radius:10px;padding:24px;max-width:520px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;">
      <div class="eyebrow">Today's session</div>
      <div class="mono" style="font-size:11px;color:var(--fg-3);">TUE · 06:30</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:24px;">
      <div>
        <div style="font-size:22px;font-weight:600;letter-spacing:-0.015em;">Threshold intervals</div>
        <div style="font-size:13px;color:var(--fg-2);margin-top:4px;">4 × 8 min @ 285 W · 4 min easy</div>
      </div>
      <div class="mono" style="font-size:32px;font-weight:500;letter-spacing:-0.01em;">1<span style="color:var(--fg-3);font-size:14px;">h </span>42<span style="color:var(--fg-3);font-size:14px;">m</span></div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--fg-3);">Eyebrow + meta on top · headline + summary · key number anchored right.</div></div>
</body>
</html>
