<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>color-zones</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Training zones · data only</div>
  <div class="row" style="gap:10px;">
    
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#5C6470;"></div>
        <div class="swatch-name">Z1 · Recovery</div>
        <div class="swatch-value">#5C6470</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#3FB37F;"></div>
        <div class="swatch-name">Z2 · Endurance</div>
        <div class="swatch-value">#3FB37F</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#E8C547;"></div>
        <div class="swatch-name">Z3 · Tempo</div>
        <div class="swatch-value">#E8C547</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#E89B3C;"></div>
        <div class="swatch-name">Z4 · Threshold</div>
        <div class="swatch-value">#E89B3C</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#E5484D;"></div>
        <div class="swatch-name">Z5 · VO2 / Anaerobic</div>
        <div class="swatch-value">#E5484D</div>
      </div>
  </div>
  <div style="font-size:12px;color:var(--fg-3);">Zone colors appear in charts, calendar pills, session pace bars. Never in buttons, links, or chrome.</div></div>
</body>
</html>
