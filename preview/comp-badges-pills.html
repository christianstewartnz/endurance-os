<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>comp-badges-pills</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Zone pills · status badges · keys</div>
  <div class="row" style="gap:8px;">
    <span class="pill" style="background:rgba(92,100,112,0.18);color:#A2A8B4;">Z1</span>
    <span class="pill" style="background:rgba(63,179,127,0.16);color:#3FB37F;">Z2</span>
    <span class="pill" style="background:rgba(232,197,71,0.16);color:#E8C547;">Z3</span>
    <span class="pill" style="background:rgba(232,155,60,0.16);color:#E89B3C;">Z4</span>
    <span class="pill" style="background:rgba(229,72,77,0.16);color:#E5484D;">Z5</span>
  </div>
  <div class="row" style="gap:8px;">
    <span class="pill" style="background:rgba(63,179,127,0.16);color:#3FB37F;">● Synced</span>
    <span class="pill" style="background:rgba(232,155,60,0.16);color:#E89B3C;">● Stale</span>
    <span class="pill" style="background:rgba(229,72,77,0.16);color:#E5484D;">● Missed</span>
    <span class="pill" style="background:var(--bg-3);color:var(--fg-2);border:1px solid var(--border-default);">Draft</span>
  </div>
  <div class="row" style="gap:6px;">
    <kbd>⌘</kbd><kbd>K</kbd>
    <span style="font-size:12px;color:var(--fg-3);margin-left:6px;">Open command bar</span>
    <kbd style="margin-left:18px;">G</kbd><span style="font-size:11px;color:var(--fg-3);">then</span><kbd>D</kbd>
    <span style="font-size:12px;color:var(--fg-3);margin-left:6px;">Go to Dashboard</span>
  </div></div>
</body>
</html>
