<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>comp-buttons</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Buttons</div>
  <div class="row" style="gap:10px;">
    <button class="btn btn-primary">Start session</button>
    <button class="btn btn-secondary">Open plan</button>
    <button class="btn btn-ghost">Skip</button>
    <button class="btn btn-danger">Delete</button>
  </div>
  <div class="row" style="gap:10px;">
    <button class="btn btn-primary" style="opacity:0.4;pointer-events:none;">Disabled</button>
    <button class="btn btn-secondary" style="box-shadow:0 0 0 1.5px rgba(216,254,95,0.6), 0 0 0 4px var(--bg-0);">Focused</button>
    <button class="btn btn-secondary" style="height:24px;padding:0 8px;font-size:12px;">Small</button>
    <button class="btn btn-secondary" style="height:36px;padding:0 14px;font-size:14px;">Large</button>
  </div>
  <div style="font-size:12px;color:var(--fg-3);">One primary per view. Press = scale 0.98, no color change.</div></div>
</body>
</html>
