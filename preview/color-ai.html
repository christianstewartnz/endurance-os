<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>color-ai</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">AI surface · for the Coach only</div>
  <div class="row" style="gap:14px;">
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#8B7CF6;"></div>
      <div class="swatch-name">--ai</div>
      <div class="swatch-value">#8B7CF6 · Calm violet</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:rgba(139,124,246,0.14);border:1px solid rgba(139,124,246,0.32);"></div>
      <div class="swatch-name">--ai-soft</div>
      <div class="swatch-value">14% · Coach bubble bg</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:var(--bg-2);border:1px solid rgba(139,124,246,0.32);display:flex;align-items:center;justify-content:center;color:#8B7CF6;font-size:11px;font-family:var(--font-mono);">AI</div>
      <div class="swatch-name">--ai-edge</div>
      <div class="swatch-value">32% · Coach inline edges</div>
    </div>
  </div></div>
</body>
</html>
