<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>color-borders</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Borders · always 1px</div>
  <div class="row" style="gap:14px;">
    
      <div class="swatch" style="flex:1;">
        <div style="height:56px;border-radius:8px;background:var(--bg-2);border:1px solid #1A1C20;"></div>
        <div class="swatch-name">--border-subtle</div>
        <div class="swatch-value">#1A1C20 · Row dividers</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div style="height:56px;border-radius:8px;background:var(--bg-2);border:1px solid #26292F;"></div>
        <div class="swatch-name">--border-default</div>
        <div class="swatch-value">#26292F · Cards, inputs</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div style="height:56px;border-radius:8px;background:var(--bg-2);border:1px solid #3A3F47;"></div>
        <div class="swatch-name">--border-strong</div>
        <div class="swatch-value">#3A3F47 · Focus, selected</div>
      </div>
  </div></div>
</body>
</html>
