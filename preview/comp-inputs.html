<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>comp-inputs</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Inputs</div>
  <div class="col" style="gap:10px;max-width:420px;">
    <input placeholder="Search sessions, plans, athletes…" style="height:32px;padding:0 12px;background:var(--bg-3);border:1px solid var(--border-default);border-radius:6px;color:var(--fg-1);font-family:inherit;font-size:13px;outline:none;"/>
    <input value="285" style="height:32px;padding:0 12px;background:var(--bg-3);border:1.5px solid #D8FE5F;border-radius:6px;color:var(--fg-1);font-family:var(--font-mono);font-size:13px;outline:none;"/>
    <div style="display:flex;align-items:center;height:32px;padding:0 12px;background:var(--bg-3);border:1px solid var(--border-default);border-radius:6px;font-size:13px;color:var(--fg-2);justify-content:space-between;">
      <span>Week of Jun 2</span>
      <span style="color:var(--fg-3);">▾</span>
    </div>
  </div>
  <div style="font-size:12px;color:var(--fg-3);">Focus ring is 1.5px accent at 60%. No box-shadow on default state.</div></div>
</body>
</html>
