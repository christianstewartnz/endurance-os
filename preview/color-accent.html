<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>color-accent</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Brand accent</div>
  <div class="row" style="gap:14px;align-items:stretch;">
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#D8FE5F;"></div>
      <div class="swatch-name">--accent</div>
      <div class="swatch-value">#D8FE5F · CTAs, focus, mark</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:#C9EE52;"></div>
      <div class="swatch-name">--accent-hover</div>
      <div class="swatch-value">#C9EE52</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div class="swatch-chip" style="background:rgba(216,254,95,0.12);border:1px solid rgba(216,254,95,0.32);"></div>
      <div class="swatch-name">--accent-soft</div>
      <div class="swatch-value">12% · Soft fills, focus rings</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--fg-3);">One accent element per view. Used sparingly — the accent is a signal, not a decoration.</div></div>
</body>
</html>
