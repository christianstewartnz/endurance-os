<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>brand-logo-wordmark</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="col" style="gap:20px;">
    <img src="../assets/logo-wordmark.svg" width="240" height="32" alt="Endurance.OS"/>
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="font-family:var(--font-sans);font-size:22px;font-weight:600;letter-spacing:-0.02em;">Endurance<span style="color:var(--accent)">.</span>OS</span></div>
      <div class="specimen-label">22px / 600 / -0.02em</div>
    </div>
    <div class="specimen-label">The dot in <span class="mono">.OS</span> is always <span class="mono" style="color:var(--accent)">--accent</span>. Never break this.</div>
  </div></div>
</body>
</html>
