<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>shadows</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Shadows · only on floating surfaces</div>
  <div class="row" style="gap:24px;padding:8px 4px 16px;">
    <div class="swatch" style="flex:1;">
      <div style="height:88px;background:var(--bg-2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.40), 0 2px 4px rgba(0,0,0,0.60), 0 0 0 1px var(--border-default);"></div>
      <div class="swatch-name">--shadow-pop</div>
      <div class="swatch-value">Menus, popovers</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div style="height:88px;background:var(--bg-2);border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,0.55), 0 4px 8px rgba(0,0,0,0.60), 0 0 0 1px var(--border-default);"></div>
      <div class="swatch-name">--shadow-modal</div>
      <div class="swatch-value">Modals, sheets</div>
    </div>
    <div class="swatch" style="flex:1;">
      <div style="height:88px;background:var(--bg-2);border-radius:10px;border:1px solid var(--border-default);"></div>
      <div class="swatch-name">No shadow</div>
      <div class="swatch-value">All other surfaces</div>
    </div>
  </div></div>
</body>
</html>
