<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>type-mono-numerics</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="row" style="gap:48px;align-items:flex-end;">
    <div class="col" style="gap:4px;">
      <div class="specimen-label">Pace</div>
      <div class="mono" style="font-size:48px;font-weight:500;letter-spacing:-0.02em;line-height:1;">4:08<span style="color:var(--fg-3);font-size:20px;">/km</span></div>
    </div>
    <div class="col" style="gap:4px;">
      <div class="specimen-label">Power</div>
      <div class="mono" style="font-size:48px;font-weight:500;letter-spacing:-0.02em;line-height:1;">285<span style="color:var(--fg-3);font-size:20px;"> W</span></div>
    </div>
    <div class="col" style="gap:4px;">
      <div class="specimen-label">HR</div>
      <div class="mono" style="font-size:48px;font-weight:500;letter-spacing:-0.02em;line-height:1;">162<span style="color:var(--fg-3);font-size:20px;"> bpm</span></div>
    </div>
  </div>
  <div class="specimen-label">Mono is load-bearing. Any quantity gets it.</div></div>
</body>
</html>
