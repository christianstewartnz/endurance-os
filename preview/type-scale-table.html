<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>type-scale-table</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Type scale</div>
  <div class="col" style="gap:10px;">
    
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">Display</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">40/600</div>
        <div style="font-size:40px;font-weight:600;letter-spacing:-0.015em;line-height:1.2;">Threshold, held.</div>
      </div>
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">H1</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">28/600</div>
        <div style="font-size:28px;font-weight:600;letter-spacing:-0.015em;line-height:1.2;">Today's session</div>
      </div>
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">H2</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">22/600</div>
        <div style="font-size:22px;font-weight:600;letter-spacing:-0.015em;line-height:1.2;">Week 11 · Build</div>
      </div>
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">H3</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">17/600</div>
        <div style="font-size:17px;font-weight:600;line-height:1.2;">Recent sessions</div>
      </div>
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">Body</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">14/400</div>
        <div style="font-size:14px;font-weight:400;line-height:1.2;">HRV 8% below baseline.</div>
      </div>
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">Small</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">13/400</div>
        <div style="font-size:13px;font-weight:400;line-height:1.2;">Synced 2 min ago</div>
      </div>
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">XS</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">12/400</div>
        <div style="font-size:12px;font-weight:400;line-height:1.2;">Tue · 06:30</div>
      </div>
      <div style="display:grid;grid-template-columns:80px 80px 1fr;align-items:baseline;gap:16px;">
        <div class="mono" style="font-size:11px;color:var(--fg-3);">Eyebrow</div>
        <div class="mono" style="font-size:11px;color:var(--fg-3);">11/500</div>
        <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-3);line-height:1.2;">TODAY · TUE 06:30</div>
      </div>
  </div></div>
</body>
</html>
