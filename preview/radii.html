<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>radii</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Corner radii</div>
  <div class="row" style="gap:14px;">
    
      <div class="swatch" style="flex:1;">
        <div style="height:64px;background:var(--bg-2);border:1px solid var(--border-default);border-radius:4px;"></div>
        <div class="swatch-name">--radius-1</div>
        <div class="swatch-value">4px · Pills, tags</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div style="height:64px;background:var(--bg-2);border:1px solid var(--border-default);border-radius:6px;"></div>
        <div class="swatch-name">--radius-2</div>
        <div class="swatch-value">6px · Buttons, items</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div style="height:64px;background:var(--bg-2);border:1px solid var(--border-default);border-radius:10px;"></div>
        <div class="swatch-name">--radius-3</div>
        <div class="swatch-value">10px · Cards, panels</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div style="height:64px;background:var(--bg-2);border:1px solid var(--border-default);border-radius:14px;"></div>
        <div class="swatch-name">--radius-4</div>
        <div class="swatch-value">14px · Modals, sheets</div>
      </div>
  </div>
  <div style="font-size:12px;color:var(--fg-3);">No pill buttons. Max card radius is 14px.</div></div>
</body>
</html>
