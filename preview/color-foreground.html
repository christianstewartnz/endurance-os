<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>color-foreground</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">
  <div class="eyebrow">Foreground</div>
  <div class="row" style="gap:14px;">
    
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#F7F8F8;"></div>
        <div class="swatch-name">--fg-1</div>
        <div class="swatch-value">#F7F8F8 · Primary</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#B4B8BE;"></div>
        <div class="swatch-name">--fg-2</div>
        <div class="swatch-value">#B4B8BE · Secondary</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#6F7480;"></div>
        <div class="swatch-name">--fg-3</div>
        <div class="swatch-value">#6F7480 · Tertiary</div>
      </div>
      <div class="swatch" style="flex:1;">
        <div class="swatch-chip" style="background:#494D55;"></div>
        <div class="swatch-name">--fg-4</div>
        <div class="swatch-value">#494D55 · Disabled</div>
      </div>
  </div></div>
</body>
</html>
